# release.yml - tag-driven build pipeline producing a DRAFT GitHub release.
#
# Trigger: push of a `vX.Y.Z` tag (semver). PR triggers are intentionally NOT
# present - this workflow has `contents: write` permission and creates releases,
# so we do not want forks/PRs to invoke it.
#
# Pipeline shape (hybrid CI / local-sign):
#
#   build-host-windows  ->\
#                          \
#   build-extension      -->-> release-draft  -> [operator runs sign-and-publish.ps1 locally]
#                          /
#   package-windows     ->/   (depends on build-host-windows)
#
# All artifacts produced here are UNSIGNED. The SafeNet UCert USB token cannot
# be plugged into a GitHub-hosted runner, so signing happens on a workstation
# via installer/windows/sign-and-publish.ps1 against the draft release this
# workflow creates.

name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

# Serialize releases per tag ref. cancel-in-progress=false because aborting a
# half-uploaded release would leave the draft in an inconsistent state.
concurrency:
  group: "release-${{ github.ref }}"
  cancel-in-progress: false

jobs:
  build-host-windows:
    name: Build native host (windows-amd64)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true
          cache-dependency-path: native-host/go.sum

      - name: Build fx-host.exe
        working-directory: native-host
        run: go build -o bin\fx-host.exe .\cmd\fx-host

      - name: Upload host artifact
        uses: actions/upload-artifact@v4
        with:
          name: fx-host-windows
          path: native-host/bin/fx-host.exe
          if-no-files-found: error
          retention-days: 7

  build-extension:
    name: Build Chrome extension zip
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: extension/package-lock.json

      - name: Install dependencies
        working-directory: extension
        run: npm ci

      - name: Build extension (production zip)
        working-directory: extension
        run: npm run build:prod

      - name: Upload extension artifact
        uses: actions/upload-artifact@v4
        with:
          name: extension-zip
          # extension/scripts/package.mjs writes localfx-v<version>.zip into dist-prod/
          path: extension/dist-prod/localfx-v*.zip
          if-no-files-found: error
          retention-days: 7

  package-windows:
    name: Build Inno Setup installer (unsigned)
    runs-on: windows-latest
    needs: build-host-windows
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download fx-host.exe artifact
        uses: actions/download-artifact@v4
        with:
          name: fx-host-windows
          path: native-host/bin

      - name: Install Inno Setup 6.2.2
        # Pinning to 6.2.2 - the version known to compose with setup.iss and
        # matches the local dev install (C:\Users\<user>\AppData\Local\Programs\
        # Inno Setup 6\ISCC.exe). Bumping the pin requires re-testing the
        # AppId / DefaultDirName behavior on a clean Windows install.
        run: choco install innosetup --version=6.2.2 -y --no-progress

      - name: Compile installer (unsigned)
        # No -Sign here. CI cannot reach the SafeNet USB token; signing happens
        # locally via sign-and-publish.ps1 after this workflow completes.
        # `shell: pwsh` already invokes PowerShell 7 - calling `pwsh script.ps1`
        # would spawn a second pwsh process inside the first, doubling startup
        # cost and creating subtle exit-code-propagation edge cases. Just run
        # the script directly under the pwsh shell.
        shell: pwsh
        run: installer\windows\build-setup.ps1

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: installer-unsigned
          path: extension/dist-prod/localfx-host-setup-v*.exe
          if-no-files-found: error
          retention-days: 7

  release-draft:
    name: Create draft GitHub release
    runs-on: ubuntu-latest
    needs:
      - build-host-windows
      - build-extension
      - package-windows
    steps:
      - name: Checkout
        # Needed so `gh release create` can resolve the tag and `gh` can find
        # the repo from the .git directory. (gh also accepts --repo, but pulling
        # the checkout keeps the action simple.)
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Stage assets + compute SHA256SUMS.txt
        id: stage
        run: |
          set -euo pipefail
          mkdir -p stage
          # Flatten artifact tree into stage/ so the gh upload command takes
          # plain file paths (gh release upload does not glob recursively).
          find artifacts -type f \( -name '*.exe' -o -name '*.zip' \) -print0 \
            | xargs -0 -I{} cp -v {} stage/

          # T3 dependency: extension/src/ui/components/HostMissingOnboarding.tsx
          # links to the stable URL
          # https://github.com/ssallem/local-fx/releases/latest/download/localfx-host-setup-windows.exe
          # The `latest/download/<filename>` redirect only resolves when an
          # asset with that EXACT filename exists. Our installer ships as
          # localfx-host-setup-v<version>.exe (versioned), so we publish a
          # second copy with the stable name. Same bytes, so SHA256SUMS will
          # list the same hash twice - that's expected and `sha256sum -c` is
          # fine with it.
          INSTALLER=$(ls stage/localfx-host-setup-v*.exe 2>/dev/null | head -n1)
          if [ -n "$INSTALLER" ]; then
            cp -v "$INSTALLER" stage/localfx-host-setup-windows.exe
          fi

          cd stage
          # GNU coreutils sha256sum format: "<lowercase-hex>  <basename>".
          # `sort` so the file is deterministic across re-runs of the same SHA.
          sha256sum *.exe *.zip 2>/dev/null | sort > SHA256SUMS.txt
          echo "---- SHA256SUMS.txt ----"
          cat SHA256SUMS.txt
          echo "------------------------"
          ls -la

      - name: Create or update draft release with assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          # Idempotency guard: re-running the workflow on the same tag (manual
          # re-run from the Actions UI, or delete-and-re-push of the tag) would
          # otherwise hit "release already exists" and fail the step red. Check
          # first and route to the upload-only path if so.
          if gh release view "$TAG" --json isDraft >/dev/null 2>&1; then
            echo "::notice::Release $TAG already exists. Updating assets only."
            gh release upload "$TAG" stage/* --clobber
          else
            # --draft so the release stays hidden until the operator runs
            # installer/windows/sign-and-publish.ps1 from a workstation.
            # --generate-notes pulls commit log between this tag and the previous one.
            gh release create "$TAG" \
              --draft \
              --generate-notes \
              --title "$TAG" \
              stage/*
          fi

          URL=$(gh release view "$TAG" --json url --jq .url)
          echo ""
          echo "==================================================================="
          echo "DRAFT release ready: $URL"
          echo ""
          echo "WARNING: this release is UNSIGNED and in DRAFT state."
          echo "Run the following from a workstation with the SafeNet USB token:"
          echo ""
          echo "    pwsh installer\\windows\\sign-and-publish.ps1 -Tag $TAG"
          echo ""
          echo "to sign localfx-host-setup-v*.exe, regenerate SHA256SUMS.txt,"
          echo "and publish (un-draft) the release."
          echo "==================================================================="
